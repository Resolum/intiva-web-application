user  nginx;
worker_processes  auto;

# Error logging configuration
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# Events block configuration
# Purpose: Configures connection processing.
# Performance reasoning: 1024 is a good default for the maximum number of simultaneous 
# connections per worker process.
events {
    worker_connections  1024;
}

# Core HTTP server configuration
http {
    # Include standard MIME types mapping
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Standard logging format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Sendfile configuration
    # Performance reasoning: Enables zero-copy data transfer, directly copying data from one 
    # file descriptor to another in kernel space, avoiding context switches and CPU overhead.
    sendfile        on;
    
    # TCP configurations (optional, commented by default)
    #tcp_nopush     on;

    # Keepalive configuration
    # Performance reasoning: Keeps TCP connections open for a set duration, reducing the 
    # latency of establishing new connections for subsequent requests from the same client.
    keepalive_timeout  65;

    # ==========================================
    # Gzip Compression Settings
    # ==========================================
    # Purpose: Compresses textual responses before sending them to the client.
    # Performance reasoning: Significantly reduces bandwidth usage and accelerates page load times 
    # by shrinking HTML, CSS, JS, and JSON files, often by 60-80%.
    gzip  on;
    
    # Disable gzip for very old IE versions that don't support it well
    gzip_disable "msie6";
    
    # Add a 'Vary: Accept-Encoding' response header
    # Purpose: Ensures intermediate caches (like CDNs) store both compressed and uncompressed 
    # versions of the asset, serving the correct one based on client capabilities.
    gzip_vary on;
    
    # Compress data even for clients connecting via proxies
    gzip_proxied any;
    
    # Compression level (1-9)
    # Performance reasoning: Level 6 offers the best balance. Higher levels consume disproportionately 
    # more CPU for negligible size reductions.
    gzip_comp_level 6;
    
    # Number and size of buffers for compression
    gzip_buffers 16 8k;
    
    # Minimum HTTP version required to use compression
    gzip_http_version 1.1;
    
    # Specify the MIME types that should be compressed
    # Note: Avoid compressing binary files like images or videos, as they are already compressed 
    # and trying to compress them again wastes CPU.
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Include additional server block configurations (like default.conf)
    include /etc/nginx/conf.d/*.conf;
}
