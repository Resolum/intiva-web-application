# Main server block configuration
server {
    # Port configuration
    # Purpose: Instructs Nginx to listen on port 80 for IPv4 and IPv6 traffic.
    listen       80;
    listen  [::]:80;
    
    # Server name configuration
    server_name  localhost;

    # Root directory and index file setup
    # Purpose: Specifies where Nginx should look for files to serve.
    # This matches the destination path specified in the Dockerfile.
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # ==========================================
    # Single Page Application (SPA) Routing
    # ==========================================
    # Purpose: Supports Vue Router's HTML5 history mode.
    # Reasoning: In a SPA, routes like '/analytics' don't correspond to actual directories 
    # or files on the server. If a user directly visits or refreshes '/analytics', 
    # Nginx would normally return a 404 error. The 'try_files' directive attempts to:
    # 1. Serve the exact file requested ($uri).
    # 2. Serve the directory requested ($uri/).
    # 3. If neither exists, fallback to '/index.html' so Vue Router can take over 
    #    and render the correct client-side view.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # Aggressive Caching for Static Assets
    # ==========================================
    # Purpose: Maximizes caching for Vite-generated assets.
    # Reasoning: Vite bundles CSS, JS, and images into the '/assets/' directory, 
    # appending a unique content hash to each filename (e.g., 'main-b8xR9a.js'). 
    # Because the filename changes whenever the content changes, it is 100% safe to cache 
    # these files permanently.
    # Performance: 'max-age=31536000' (1 year) and 'immutable' tell the browser to never 
    # re-validate these files, eliminating network requests entirely for repeat visits.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off; # Disable logging for static assets to reduce disk I/O and save space
    }

    # ==========================================
    # No-Cache Strategy for Entry Point
    # ==========================================
    # Purpose: Ensures users always get the latest version of the application.
    # Reasoning: 'index.html' contains the references (script and link tags) to the hashed 
    # assets mentioned above. If 'index.html' is cached, the user will load an old version 
    # of the app and might miss critical updates.
    # Performance/Security: 'no-store' completely prevents caching. Every time the app loads, 
    # it fetches a fresh 'index.html', ensuring it loads the most recent hashed assets.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Default Nginx error page handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
